services:
  db:
    image: postgres:18
    container_name: game-postgres
    environment:
      # Şifre .env'den okunur (dosyaya gömme; compose git'e girer)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gamebackend
    ports:
      - "5432:5432"
    volumes:
      # İsimli volume: container silinse bile veri 'pgdata'da kalır.
      # postgres:18 imajı VOLUME olarak /var/lib/postgresql kullanır.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gamebackend"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
